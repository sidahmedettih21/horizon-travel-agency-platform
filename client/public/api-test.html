<!DOCTYPE html>
<html>
<head><title>Horizon API Test</title></head>
<body>
<h1>Horizon API Test</h1>
<button onclick="testPublic()">1. Test Public Offers</button>
<button onclick="testLogin()">2. Test Login</button>
<button onclick="testCreateOffer()">3. Test Create Offer</button>
<button onclick="testDeleteLast()">4. Delete Last Created Offer</button>
<pre id="output"></pre>

<script>
const API_BASE = 'http://localhost:3000';
const AGENCY_ID = 1;
let lastCreatedUuid = null;

function log(msg) {
  document.getElementById('output').textContent += msg + '\n';
}

async function testPublic() {
  try {
    const res = await fetch(`${API_BASE}/api/content/${AGENCY_ID}/offer`);
    const data = await res.json();
    log('📦 Public offers: ' + JSON.stringify(data, null, 2));
  } catch(e) { log('❌ Error: ' + e); }
}

async function testLogin() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({email:'admin@anouarelsabah.com', password:'anouar2026'})
    });
    const data = await res.json();
    log('🔐 Login: ' + JSON.stringify(data));
  } catch(e) { log('❌ Error: ' + e); }
}

async function testCreateOffer() {
  try {
    const res = await fetch(`${API_BASE}/api/content/admin/offer`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        data: {title:{en:'Browser Test Offer'}, price:888},
        is_active: true
      })
    });
    const data = await res.json();
    if (data.uuid) lastCreatedUuid = data.uuid;
    log('➕ Create offer: ' + JSON.stringify(data));
  } catch(e) { log('❌ Error: ' + e); }
}

async function testDeleteLast() {
  if (!lastCreatedUuid) {
    log('⚠️ No offer UUID saved. Create one first.');
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/api/content/admin/offer/${lastCreatedUuid}`, {
      method: 'DELETE',
      credentials: 'include'
    });
    const data = await res.json();
    log('🗑️ Delete: ' + JSON.stringify(data));
    lastCreatedUuid = null;
  } catch(e) { log('❌ Error: ' + e); }
}
</script>
</body>
</html>
